worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy       strict-origin-when-cross-origin always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=app:10m   rate=120r/m;

    upstream dotnet_app {
        server app:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 50m;

        # Health check (bypass rate limit)
        location /health {
            proxy_pass http://dotnet_app;
            proxy_http_version 1.1;
            access_log off;
        }

        # Login rate limiting
        location /Account/Login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass         http://dotnet_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Static files (uploads)
        location /uploads/ {
            alias /app/wwwroot/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # All other requests → ASP.NET Core app
        location / {
            limit_req zone=app burst=30 nodelay;
            proxy_pass         http://dotnet_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
