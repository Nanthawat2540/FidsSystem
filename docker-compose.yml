version: "3.9"

services:
  # ─── SQL Server ───────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fids_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD:-Fids@Strong1234}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - fids_db_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_SA_PASSWORD:-Fids@Strong1234} -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── ASP.NET Core App ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fids_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=FidsDB;User Id=sa;Password=${DB_SA_PASSWORD:-Fids@Strong1234};TrustServerCertificate=True;"
    ports:
      - "8080:8080"
    volumes:
      - fids_uploads:/app/wwwroot/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── NGINX Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fids_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - fids_uploads:/app/wwwroot/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  fids_db_data:
    name: fids_db_data
  fids_uploads:
    name: fids_uploads

networks:
  default:
    name: fids_network
    driver: bridge
